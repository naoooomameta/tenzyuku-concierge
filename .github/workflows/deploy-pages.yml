name: Deploy LP to GitHub Pages

# main へのプッシュ（PR マージ含む）で LP を GitHub Pages へ自動公開します。
# 手動実行もできます（Actions タブの "Run workflow"）。
on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1本に制限（進行中のデプロイは中断せず完了させる）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Pages 未有効でも初回に自動で有効化を試みる
          enablement: true

      - name: Stage site files
        run: |
          # 公開物だけを _site にまとめる（README や .github を公開しない）
          mkdir -p _site
          cp *.html _site/
          # 将来アセットを追加したら、存在するものを公開物へコピー
          for d in assets img images css js fonts; do
            if [ -d "$d" ]; then cp -r "$d" _site/; fi
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
