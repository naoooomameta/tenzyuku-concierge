<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="成績の伸びを表すイメージ（画像プレースホルダ）">
  <defs>
    <linearGradient id="tjbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B2A52"/>
      <stop offset="1" stop-color="#163C72"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#tjbg)"/>
  <circle cx="660" cy="120" r="160" fill="#C49A3F" opacity="0.15"/>
  <circle cx="120" cy="520" r="130" fill="#2F6EE3" opacity="0.20"/>

  <!-- baseline -->
  <line x1="180" y1="470" x2="640" y2="470" stroke="#ffffff" stroke-opacity="0.25" stroke-width="3"/>

  <!-- ascending bars（成績の伸び） -->
  <rect x="220" y="360" width="64" height="110" rx="10" fill="#ffffff" opacity="0.22"/>
  <rect x="316" y="300" width="64" height="170" rx="10" fill="#ffffff" opacity="0.32"/>
  <rect x="412" y="232" width="64" height="238" rx="10" fill="#2F6EE3"/>
  <rect x="508" y="160" width="64" height="310" rx="10" fill="#C49A3F"/>

  <!-- upward trend arrow -->
  <polyline points="232,388 332,330 428,262 556,150" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M556 150 l-36 4 M556 150 l-4 36" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>

  <!-- placeholder caption -->
  <text x="400" y="556" text-anchor="middle" font-family="serif" font-size="22" fill="#ffffff" fill-opacity="0.45">画像プレースホルダ（差し替え可）</text>
</svg>
